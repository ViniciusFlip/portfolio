<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
    darkMode: 'class'
}
</script>

<title>Financeiro</title>
</head>

<body class="bg-gray-100 dark:bg-gray-900 transition">
<div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-6">

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow p-5">
        <p class="text-gray-500 text-sm">Saldo Atual</p>

        <h2
            id="saldo"
            class="text-3xl font-bold text-blue-600 mt-2">

            R$ 0,00

        </h2>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow p-5">

        <p class="text-gray-500 text-sm">

            Entradas

        </p>

        <h2
            id="entradas"
            class="text-3xl font-bold text-green-600 mt-2">

            R$ 0,00

        </h2>

    </div>

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow p-5">

        <p class="text-gray-500 text-sm">

            Saídas

        </p>

        <h2
            id="saidas"
            class="text-3xl font-bold text-red-600 mt-2">

            R$ 0,00

        </h2>

    </div>

</div>
<div class="max-w-4xl mx-auto p-6">

<div class="flex justify-between items-center mb-6">

<h1 class="text-3xl font-bold text-gray-800 dark:text-white">
Lançamentos
</h1>

<button id="themeBtn"
class="px-4 py-2 rounded-lg bg-gray-900 text-white dark:bg-white dark:text-black">
🌙 Tema
</button>

</div>

<div class="bg-white dark:bg-gray-800 rounded-xl shadow p-5">

<input
id="command"
type="text"
placeholder="Ex: entrada 23,50 mercado taquaral"
class="w-full rounded-lg border p-3 dark:bg-gray-700 dark:text-white">

<button
    id="btnAdicionar"
    onclick="adicionar()"
    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition">
    Adicionar
</button>
<button
    id="btnCancelar"
    onclick="cancelarEdicao()"
    class="hidden bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-lg transition">
    Cancelar
</button>
</div>

<div class="mt-8 overflow-auto">

<table class="w-full bg-white dark:bg-gray-800 rounded-xl overflow-hidden">

<thead class="bg-gray-200 dark:bg-gray-700">

<tr>

<th class="p-3 text-left">Data</th>
<th class="p-3 text-left">Tipo</th>
<th class="p-3 text-left">Valor</th>
<th class="p-3 text-left">Descrição</th>
<th class="p-3">Ações</th>

</tr>

</thead>

<tbody id="tbody">

</tbody>

</table>

</div>

</div>


<script type="module" src="app.js"></script>
</body>
</html>
